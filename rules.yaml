  - pattern: $DST = $A.concat($SRC)
    from: $SRC
    to: $DST
  - pattern: $DST = [ ...$SRC ]
    from: $SRC
    to: $DST
  # --- String transformations ---
  - pattern: $DST = $SRC.trim()
    from: $SRC
    to: $DST
  - pattern: $DST = $SRC.replace(...)
    from: $SRC
    to: $DST
  - pattern: $DST = $SRC.replaceAll(...)
    from: $SRC
    to: $DST
  - pattern: $DST = $SRC.toLowerCase()
    from: $SRC
    to: $DST
  - pattern: $DST = $SRC.toUpperCase()
    from: $SRC
    to: $DST
  - pattern: $DST = String($SRC)
    from: $SRC
    to: $DST
  - pattern: $DST = JSON.parse($SRC)
    from: $SRC
    to: $DST
  - pattern: $DST = JSON.stringify($SRC)
    from: $SRC
    to: $DST
  # --- Object transformations ---
  - pattern: $DST = Object.assign($DST, $SRC)
    from: $SRC
    to: $DST
  - pattern: Object.assign($DST, $SRC)
    from: $SRC
    to: $DST
  - pattern: $DST = { ...$SRC }
    from: $SRC
    to: $DST
  # --- Encoding / decoding ---
  - pattern: $DST = decodeURIComponent($SRC)
    from: $SRC
    to: $DST
  - pattern: $DST = encodeURIComponent($SRC)
    from: $SRC
    to: $DST
  # --- Template / concat ---
  - pattern: $DST = `...${ $SRC }...`
    from: $SRC
    to: $DST
  - pattern: $DST = $A + $SRC
    from: $SRC
    to: $DST
  - pattern: $DST = $SRC + $A
    from: $SRC
    to: $DST

