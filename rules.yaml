rules:
  # ==============================================================================
  # 1. Паттерны, связанные с небезопасной обработкой пользовательского ввода
  #    и внедрением HTML-кода (XSS)
  # ==============================================================================

  # --- DOM API (General JS) ---

  - id: dom-insecure-html-injection-taint
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      DOM XSS: Untrusted user input is flowing into a DOM insertion point 
      (innerHTML, outerHTML, insertAdjacentHTML). This allows execution of arbitrary scripts. 
      Ensure data is properly sanitized using DOMPurify or safely cast to a number/boolean.
    options:
      interfile: true
      taint_assume_safe_indexes: true
    pattern-sources: *js_sources
    pattern-propagators: *js_propagators
    pattern-sinks:
      - pattern-either:
          - pattern: $EL.innerHTML = $SINK
          - pattern: $EL.outerHTML = $SINK
          - pattern: $EL.innerHTML += $SINK
          - pattern: $EL.outerHTML += $SINK
          - pattern: document.body.innerHTML = $SINK
          - pattern: document.body.outerHTML = $SINK
          - pattern: $EL.srcdoc = $SINK
          - patterns:
              - pattern: $EL.insertAdjacentHTML($POS, $SINK)
              - focus-metavariable: $SINK
          - patterns:
              - pattern: $RANGE.createContextualFragment($SINK)
              - focus-metavariable: $SINK
          - patterns:
              - pattern: $JQ.html($SINK)
              - focus-metavariable: $SINK
          - patterns:
              - pattern: $JQ.append($SINK)
              - focus-metavariable: $SINK
          - patterns:
              - pattern: $JQ.prepend($SINK)
              - focus-metavariable: $SINK
          - patterns:
              - pattern: $JQ.after($SINK)
              - focus-metavariable: $SINK
          - patterns:
              - pattern: $JQ.before($SINK)
              - focus-metavariable: $SINK
    pattern-sanitizers:
      - pattern-either:
          - pattern: DOMPurify.sanitize(...)
          - pattern: sanitizeHtml(...)
          - pattern: parseInt(...)
          - pattern: parseFloat(...)
          - pattern: Number(...)
          - pattern: Boolean(...)
          - pattern: |
              if (typeof $SINK === 'number') { ... }
          - pattern: |
              if (typeof $SINK === 'boolean') { ... }

  - id: dom-insecure-document-write-taint
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      DOM XSS: Untrusted user input is passed directly to document.write() or document.writeln(). 
      This allows execution of arbitrary scripts and alters the document structure. 
      Refactor to use safe DOM manipulation methods.
    options:
      interfile: true
      taint_assume_safe_indexes: true
    pattern-sources: *js_sources
    pattern-propagators: *js_propagators
    pattern-sinks:
      - pattern-either:
          - pattern: document.write(`...${$SINK}...`)
          - pattern: document.writeln(`...${$SINK}...`)
    pattern-sanitizers:
      - pattern-either:
          - pattern: DOMPurify.sanitize(...)
          - pattern: sanitizeHtml(...)
          - pattern: parseInt(...)
          - pattern: parseFloat(...)
          - pattern: Number(...)
          - pattern: |
              if (typeof $SINK === 'number') { ... }

  - id: dom-insecure-javascript-url
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      XSS Vector: Detected 'javascript:' URI scheme usage. 
      If any part of the string is user-controlled, it leads to Cross-Site Scripting. 
      Refactor to use event handlers (onClick, addEventListener) instead.
    patterns:
      - pattern-either:
          - pattern: <$TAG ... href={`javascript:${$VAL}`} ... />
          - pattern: <$TAG ... href={"javascript:" + $VAL} ... />
          - pattern: <$TAG ... href={'javascript:' + $VAL} ... />
          - pattern: <$TAG ... href="javascript:$CODE" ... />
          - pattern: <$TAG ... href='javascript:$CODE' ... />
          - pattern: <$TAG ... href={"javascript:$CODE"} ... />
          - pattern-regex: '<[a-zA-Z0-9_]+\s+[^>]*href=["'']\s*javascript:.*["''][^>]*>'
          - pattern: $EL.href = `javascript:${$VAL}`
          - pattern: $EL.href = "javascript:" + $VAL
          - pattern: $EL.href = 'javascript:' + $VAL
          - pattern: $EL.setAttribute("href", `javascript:${$VAL}`)
          - pattern: $EL.setAttribute('href', `javascript:${$VAL}`)
          - pattern: $EL.setAttribute("href", "javascript:" + $VAL)
          - pattern: $EL.setAttribute('href', 'javascript:' + $VAL)
          - pattern: window.open("javascript:" + $VAL, ...)
          - pattern: window.open(`javascript:${$VAL}`, ...)
          - pattern: window.location = "javascript:" + $VAL
          - pattern: window.location.href = `javascript:${$VAL}`

  # --- React ---

  - id: react-insecure-html-injection-taint
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      React XSS: Untrusted user input is flowing into 'dangerouslySetInnerHTML'. 
      This completely bypasses React's built-in auto-escaping and allows script injection. 
      Ensure data is properly sanitized using DOMPurify before rendering.
    options:
      interfile: true
      taint_assume_safe_indexes: true
    pattern-sources: *js_sources
    pattern-propagators: *js_propagators
    pattern-sinks:
      - pattern-either:
          - pattern: |
              <$_ dangerouslySetInnerHTML={{ __html: $SINK }} ... />
          - pattern: |
              <$_ dangerouslySetInnerHTML={{ "__html": $SINK }} ... />
          - pattern: |
              <$_ dangerouslySetInnerHTML={{ '__html': $SINK }} ... />
          - pattern: |
              React.createElement($TAG, { ..., dangerouslySetInnerHTML: { __html: $SINK }, ... }, ...)
          - pattern: |
              React.createElement($TAG, { ..., "dangerouslySetInnerHTML": { "__html": $SINK }, ... }, ...)
          - patterns:
              - pattern-inside: |
                  $OBJ = { __html: $SINK };
                  ...
              - pattern: <$_ dangerouslySetInnerHTML={$OBJ} ... />
    pattern-sanitizers:
      - pattern-either:
          - pattern: DOMPurify.sanitize(...)
          - pattern: sanitizeHtml(...)
          - pattern: parseInt(...)
          - pattern: parseFloat(...)
          - pattern: Number(...)
          - pattern: |
              if (typeof $SINK === 'number') { ... }

  - id: react-insecure-href-taint
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      React XSS: Untrusted user data is assigned directly to an 'href' attribute. 
      If the data contains a 'javascript:' URI and a user clicks the link, arbitrary 
      JavaScript will execute. Ensure the URL is validated to start with 'http://', 'https://', or '/'.
    options:
      interfile: true
      taint_assume_safe_indexes: true
    pattern-sources: *js_sources
    pattern-propagators: *js_propagators
    pattern-sinks:
      - pattern-either:
          - pattern: <$TAG ... href={$SINK} ... />
          - pattern: <$TAG ... href={`...${$SINK}...`} ... />
          - pattern: <$TAG ... href={"..." + $SINK} ... />
          - pattern: |
              React.createElement("a", { ..., href: $SINK, ... }, ...)
          - pattern: |
              React.createElement("area", { ..., href: $SINK, ... }, ...)
    pattern-sanitizers:
      - pattern-either:
          - pattern: |
              if ($SINK.startsWith('http')) { ... }
          - pattern: |
              if ($SINK.startsWith('/')) { ... }
          - pattern: |
              if ($SINK.startsWith('./')) { ... }
          - pattern: |
              if ($SINK.indexOf('http') === 0) { ... }
          - pattern: |
              if ($SINK.indexOf('/') === 0) { ... }
          - patterns:
              - pattern-inside: |
                  $URL_OBJ = new URL($SINK);
                  ...
                  if ($URL_OBJ.protocol === 'https:' || $URL_OBJ.protocol === 'http:') { ... }
              - pattern: $SINK

  - id: react-next-searchparams-xss-taint
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Next.js XSS: Untrusted user input from URL parameters (searchParams, query) 
      reaches 'dangerouslySetInnerHTML' without sanitization. This leads to XSS 
      during Server-Side Rendering (SSR) or on the client.
    options:
      interfile: true
      taint_assume_safe_indexes: true
    pattern-sources: *react_sources
    pattern-propagators: *js_propagators
    pattern-sinks:
      - pattern-either:
          - pattern: |
              <$_ dangerouslySetInnerHTML={{ __html: $SINK }} ... />
          - pattern: |
              <$_ dangerouslySetInnerHTML={{ "__html": $SINK }} ... />
          - pattern: |
              <$_ dangerouslySetInnerHTML={{ '__html': $SINK }} ... />
          - pattern: |
              React.createElement($TAG, { ..., dangerouslySetInnerHTML: { __html: $SINK }, ... }, ...)
          - patterns:
              - pattern-inside: |
                  $OBJ = { __html: $SINK };
                  ...
              - pattern: <$_ dangerouslySetInnerHTML={$OBJ} ... />
    pattern-sanitizers:
      - pattern-either:
          - pattern: DOMPurify.sanitize(...)
          - pattern: sanitizeHtml(...)
          - pattern: parseInt(...)
          - pattern: parseFloat(...)
          - pattern: Number(...)
          - pattern: |
              if (typeof $SINK === 'number') { ... }

  # --- Angular ---

  - id: angular-insecure-html-injection-template
    languages: [html]
    severity: WARNING
    message: >-
      Angular Security Warning: Binding to [innerHTML] or [outerHTML] detected. 
      While Angular sanitizes these bindings by default, if the input is explicitly marked 
      as trusted elsewhere (bypassSecurityTrustHtml), it will execute malicious scripts. 
      Ensure the bound value is strictly controlled.
    pattern-regex: '(?i)(?:\[innerHTML\]|\[outerHTML\]|bind-innerHTML|bind-outerHTML|innerHTML|outerHTML)\s*=\s*["''][^"''\>]*["'']'

  - id: angular-insecure-elementref-bypass-taint
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Angular XSS: Using ElementRef.nativeElement or Renderer2 to directly set innerHTML 
      bypasses Angular's built-in DomSanitizer. If the assigned data is user-controlled, 
      this leads directly to DOM XSS. Always sanitize untrusted data with DOMPurify.
    options:
      interfile: true
      taint_assume_safe_indexes: true
    pattern-sources: *angular_sources
    pattern-propagators: *js_propagators
    pattern-sinks:
      - pattern-either:
          - pattern: $REF.nativeElement.innerHTML = $SINK
          - pattern: $REF.nativeElement.outerHTML = $SINK
          - patterns:
              - pattern: $REF.nativeElement.insertAdjacentHTML($POS, $SINK)
              - focus-metavariable: $SINK
          - patterns:
              - pattern: |
                  $RENDERER.setProperty($EL, 'innerHTML', $SINK)
              - focus-metavariable: $SINK
          - patterns:
              - pattern: |
                  $RENDERER.setProperty($EL, "innerHTML", $SINK)
              - focus-metavariable: $SINK
          - patterns:
              - pattern: |
                  $RENDERER.setProperty($EL, 'outerHTML', $SINK)
              - focus-metavariable: $SINK
          - patterns:
              - pattern: |
                  $RENDERER.setProperty($EL, "outerHTML", $SINK)
              - focus-metavariable: $SINK
    pattern-sanitizers:
      - pattern-either:
          - pattern: DOMPurify.sanitize(...)
          - pattern: sanitizeHtml(...)
          - pattern: parseInt(...)
          - pattern: parseFloat(...)
          - pattern: Number(...)
          - pattern: Boolean(...)
          - pattern: |
              if (typeof $SINK === 'number') { ... }
          - pattern: |
              if (typeof $SINK === 'boolean') { ... }

  - id: angular-insecure-bypass-security-taint
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Angular XSS: Bypassing Angular's DomSanitizer explicitly disables built-in XSS protection. 
      Methods like bypassSecurityTrustHtml tell Angular to trust the provided string blindly. 
      If user input reaches these methods without strict sanitization, it leads to XSS.
    options:
      interfile: true
      taint_assume_safe_indexes: true
    pattern-sources: *angular_sources
    pattern-propagators: *js_propagators
    pattern-sinks:
      - pattern-either:
          - pattern: $SAN.bypassSecurityTrustHtml($SINK)
          - pattern: $SAN.bypassSecurityTrustScript($SINK)
          - pattern: $SAN.bypassSecurityTrustUrl($SINK)
          - pattern: $SAN.bypassSecurityTrustResourceUrl($SINK)
          - pattern: $SAN.bypassSecurityTrustStyle($SINK)
          - pattern: this.$SAN.bypassSecurityTrustHtml($SINK)
          - pattern: this.$SAN.bypassSecurityTrustScript($SINK)
          - pattern: this.$SAN.bypassSecurityTrustUrl($SINK)
          - pattern: this.$SAN.bypassSecurityTrustResourceUrl($SINK)
          - pattern: this.$SAN.bypassSecurityTrustStyle($SINK)
    pattern-sanitizers:
      - pattern-either:
          - pattern: DOMPurify.sanitize(...)
          - pattern: sanitizeHtml(...)
          - pattern: parseInt(...)
          - pattern: parseFloat(...)
          - pattern: Number(...)
          - pattern: Boolean(...)
          - pattern: |
              if (typeof $SINK === 'number') { ... }
          - pattern: |
              if (typeof $SINK === 'boolean') { ... }

  - id: angular-hostbinding-innerhtml
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      Angular Security Warning: Using @HostBinding to bind to innerHTML or outerHTML 
      can introduce XSS vulnerabilities if explicitly trusted HTML is passed to it. 
      Verify that the data bound to this property is strictly controlled.
    patterns:
      - pattern-either:
          - pattern: |
              @HostBinding('innerHTML')
              $PROP
          - pattern: |
              @HostBinding("innerHTML")
              $PROP
          - pattern: |
              @HostBinding('outerHTML')
              $PROP
          - pattern: |
              @HostBinding("outerHTML")
              $PROP

  # --- Vue ---

  - id: vue-insecure-html-injection-taint
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Vue XSS: Untrusted data is flowing into the 'domProps.innerHTML' 
      in a render function. Vue intentionally does not escape HTML inserted this way. 
      Ensure the data is sanitized using DOMPurify before rendering.
    options:
      interfile: true
      taint_assume_safe_indexes: true
    pattern-sources: *vue_sources
    pattern-propagators: *js_propagators
    pattern-sinks:
      - pattern-either:
          - pattern: |
              domProps: { ..., innerHTML: $SINK, ... }
          - pattern: |
              domProps: { ..., "innerHTML": $SINK, ... }
          - pattern: |
              domProps: { ..., 'innerHTML': $SINK, ... }
    pattern-sanitizers:
      - pattern-either:
          - pattern: DOMPurify.sanitize(...)
          - pattern: sanitizeHtml(...)
          - pattern: parseInt(...)
          - pattern: parseFloat(...)
          - pattern: Number(...)
          - pattern: Boolean(...)
          - pattern: |
              if (typeof $SINK === 'number') { ... }
          - pattern: |
              if (typeof $SINK === 'boolean') { ... }

  - id: vue-insecure-javascript-url
    languages: [html]
    severity: ERROR
    message: >-
      Vue XSS: Dynamic binding of 'javascript:' URI to href allows Cross-Site Scripting. 
      Refactor to use Vue event handlers (e.g., @click) instead of javascript URIs.
    pattern-regex: '(?i)(?::href|v-bind:href)\s*=\s*["''][^"''\>]*javascript:[^"''\>]*["'']'

  # --- Svelte ---

  - id: svelte-insecure-html-injection-route
    languages: [html]
    severity: ERROR
    message: >-
      Svelte XSS: Untrusted user input from SvelteKit's page store ($page.url) or 
      window.location is passed directly to '{@html ...}'. This completely bypasses 
      Svelte's auto-escaping. Ensure data is sanitized before rendering.
    pattern-regex: '\{@html\s+[^}]*(?:\$page\.url|\$page\.query|\$page\.params|window\.location|searchParams)[^}]*\}'

  # ==============================================================================
  # 2. Паттерны, связанные с небезопасной логикой рендеринга и работой с DOM
  # ==============================================================================

  # --- DOM API (General JS) ---

  - id: dom-insecure-code-execution-eval-taint
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Code Execution (RCE): Untrusted user input reaches eval(), new Function(), 
      setTimeout(), or setInterval(). This allows an attacker to execute arbitrary JavaScript 
      in the context of the application.
    options:
      interfile: true
      taint_assume_safe_indexes: true
    pattern-sources: *js_sources
    pattern-propagators: *js_propagators
    pattern-sinks:
      - pattern-either:
          - pattern: eval($SINK)
          - pattern: window.eval($SINK)
          - pattern: new Function(..., $SINK)
          - pattern: setTimeout($SINK, ...)
          - pattern: setInterval($SINK, ...)
          - pattern: setTimeout(`...${$SINK}...`)
          - pattern: setInterval(`...${$SINK}...`)
          - pattern: setTimeout("..." + $SINK, ...)
          - pattern: setInterval("..." + $SINK, ...)
    pattern-sanitizers:
      - pattern-either:
          - pattern: parseInt(...)
          - pattern: parseFloat(...)
          - pattern: Number(...)
          - pattern: |
              if (typeof $SINK === 'number') { ... }

  # --- React ---

  - id: react-next-server-action-missing-auth
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Access Control: Next.js Server Action performs database operations without 
      an explicit authentication or session check. Attackers can invoke this public 
      endpoint directly to bypass UI restrictions. Add auth/session validation.
    patterns:
      - pattern-either:
          - pattern-inside: |
              async function $ACTION(...) {
                "use server";
                ...
              }
          - pattern-inside: |
              export const $ACTION = async (...) => {
                "use server";
                ...
              }
          - pattern-inside: |
              "use server";
              ...
              export async function $ACTION(...) { ... }
          - pattern-inside: |
              "use server";
              ...
              export const $ACTION = async (...) => { ... }
      - pattern-either:
          - pattern: <... $DB.$MODEL.find(...) ...>
          - pattern: <... $DB.$MODEL.create(...) ...>
          - pattern: <... $DB.$MODEL.delete(...) ...>
          - pattern: <... $DB.$MODEL.update(...) ...>
          - pattern: <... $DB.$MODEL.upsert(...) ...>
          - pattern: <... sql`...` ...>
          - pattern: <... db.query(...) ...>
          - pattern: prisma.$MODEL.create(...)
          - pattern: prisma.$MODEL.update(...)
          - pattern: prisma.$MODEL.delete(...)
      - pattern-not: <... auth(...) ...>
      - pattern-not: <... getSession(...) ...>
      - pattern-not: <... verifyToken(...) ...>
      - pattern-not: <... currentUser(...) ...>
      - pattern-not: <... requireAuth(...) ...>
      - pattern-not: <... checkAuth(...) ...>
      - pattern-not: <... session.user ...>

  # --- Vue ---

  - id: vue-insecure-dynamic-component-route
    languages: [html]
    severity: ERROR
    message: >-
      Vue Component Injection: Untrusted data from Vue Router is passed directly 
      to a dynamic component '<component :is="...">'. An attacker can manipulate the URL 
      to render unintended global components or bypass logic. Ensure validation against an allowlist.
    patterns:
      - pattern-either:
          - pattern: <component :is="$VAL" ... />
          - pattern: <component :is="$VAL" ... >
          - pattern: <component v-bind:is="$VAL" ... />
          - pattern: <component v-bind:is="$VAL" ... >
      - metavariable-regex:
          metavariable: $VAL
          regex: '.*(\$route\.query|\$route\.params|\$route\.hash|window\.location).*'

  # ==============================================================================
  # 3. Паттерны, связанные с управлением состоянием и некорректной работой с данными
  # ==============================================================================

  # --- React ---

  - id: react-hooks-missing-deps
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      Performance/Logic: React hook (useEffect, useCallback, useMemo) is called without 
      a dependency array. This causes the hook to run on every single render, potentially 
      leading to severe performance degradation or infinite loops.
    patterns:
      - pattern-either:
          - pattern: useEffect($CALLBACK)
          - pattern: useCallback($CALLBACK)
          - pattern: useMemo($CALLBACK)
          - pattern: useEffect($CALLBACK, undefined)
          - pattern: useCallback($CALLBACK, undefined)
          - pattern: useMemo($CALLBACK, null)
      - pattern-not: useEffect($CALLBACK, [...])
      - pattern-not: useEffect($CALLBACK, $ANY)
      - pattern-not: useCallback($CALLBACK, [...])
      - pattern-not: useCallback($CALLBACK, $ANY)
      - pattern-not: useMemo($CALLBACK, [...])
      - pattern-not: useMemo($CALLBACK, $ANY)

  - id: react-next-data-overfetching-leak-taint
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Data Leak: Returning raw ORM/DB objects directly from getServerSideProps or 
      getStaticProps in Next.js can leak highly sensitive hidden fields (passwords, tokens) 
      to the client's HTML payload. Map the object to a safe DTO before returning.
    options:
      interfile: true
      taint_assume_safe_indexes: true
    pattern-sources:
      - pattern-either:
          - pattern: $DB.findUnique(...)
          - pattern: $DB.findMany(...)
          - pattern: $DB.findFirst(...)
          - pattern: $DB.query(...)
          - pattern: $DB.select(...)
          - pattern: $MODEL.findOne(...)
          - pattern: $MODEL.findAll(...)
          - pattern: $MODEL.find(...)
    pattern-propagators: *js_propagators
    pattern-sinks:
      - patterns:
          - pattern-inside: |
              export async function getServerSideProps(...) { ... }
          - pattern: |
              return { props: $SINK }
      - patterns:
          - pattern-inside: |
              export async function getStaticProps(...) { ... }
          - pattern: |
              return { props: $SINK }
    pattern-sanitizers:
      - pattern-either:
          - pattern: $X.map(...)
          - pattern: |
              { name: $SINK.name, email: $SINK.email }
          - pattern: |
              $DB.findUnique({ select: ... })
          - pattern: |
              $DB.findMany({ select: ... })

  # --- Angular ---

  - id: angular-nested-subscribe
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      Performance/Logic: Nested subscribe() calls detected. This leads to callback hell, 
      unmanageable race conditions, and memory leaks if not unsubscribed properly. 
      Refactor using RxJS mapping operators (switchMap, mergeMap).
    patterns:
      - pattern-either:
          - pattern: |
              $OBS1.subscribe(..., () => {
                <... $OBS2.subscribe(...) ...>
              })
          - pattern: |
              $OBS1.subscribe(..., ($DATA) => {
                <... $OBS2.subscribe(...) ...>
              })
          - pattern: |
              $OBS1.subscribe(function(...) {
                <... $OBS2.subscribe(...) ...>
              })
          - pattern: |
              $OBS1.subscribe({
                next: (...) => { <... $OBS2.subscribe(...) ...> }
              })
          - pattern: |
              $OBS1.subscribe({
                next(...) { <... $OBS2.subscribe(...) ...> }
              })

  # --- Svelte ---

  - id: svelte-store-mutation-in-subscribe
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      Performance/Logic: Mutating a Svelte store (.set() or .update()) inside a 
      .subscribe() callback is an anti-pattern. This can easily trigger infinite loops. 
      Use derived stores instead to compute state based on other stores.
    patterns:
      - pattern-either:
          - pattern: |
              $STORE1.subscribe((...) => {
                <... $STORE2.set(...) ...>
              })
          - pattern: |
              $STORE1.subscribe((...) => {
                <... $STORE2.update(...) ...>
              })
          - pattern: |
              $STORE1.subscribe(function(...) {
                <... $STORE2.set(...) ...>
              })

  # ==============================================================================
  # 4. Паттерны, связанные с небезопасной маршрутизацией
  # ==============================================================================

  # --- DOM API (General JS) ---

  - id: dom-open-redirect-taint
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Open Redirect: Untrusted user input dictates page navigation. An attacker can 
      manipulate the URL to redirect victims to a malicious site. Ensure the target URL 
      is strictly validated or constrained to relative paths.
    options:
      interfile: true
      taint_assume_safe_indexes: true
    pattern-sources: *js_sources
    pattern-propagators: *js_propagators
    pattern-sinks:
      - pattern-either:
          - pattern: window.location = $SINK
          - pattern: window.location.href = $SINK
          - pattern: window.location.assign($SINK)
          - pattern: window.location.replace($SINK)
          - pattern: window.open($SINK, ...)
    pattern-sanitizers:
      - pattern-either:
          - patterns:
              - pattern-inside: |
                  if ($SINK.startsWith('/') && !$SINK.startsWith('//')) { ... }
              - pattern: $SINK
          - pattern: |
              if ($SINK.startsWith('/')) { ... }
          - pattern: |
              if ($SINK.startsWith('./')) { ... }
          - pattern: |
              if ($SINK.indexOf('/') === 0) { ... }
          - pattern: |
              if ($SINK.startsWith(window.location.origin)) { ... }

  - id: dom-ssr-host-header-ssrf-taint
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      SSRF: DOM-based application trusts the incoming HTTP 'Host' 
      or 'X-Forwarded-Host' header to construct internal API requests. Attackers 
      can spoof this header to route internal traffic. Hardcode the API domain.
    options:
      interfile: true
      taint_assume_safe_indexes: true
    pattern-sources:
      - pattern-either:
          - pattern: $REQ.headers.host
          - pattern: $REQ.headers['host']
          - pattern: $REQ.headers['x-forwarded-host']
          - pattern: $REQ.headers.get('host')
          - pattern: $REQ.headers.get('x-forwarded-host')
    pattern-propagators: *js_propagators
    pattern-sinks:
      - pattern-either:
          - pattern: fetch($SINK, ...)
          - pattern: $HTTP.get($SINK, ...)
          - pattern: $HTTP.post($SINK, ...)
          - pattern: $HTTP.put($SINK, ...)
          - pattern: $HTTP.delete($SINK, ...)
          - pattern: $HTTP.request(..., $SINK, ...)
          - pattern: $axios.get($SINK)
          - pattern: $axios.post($SINK)

  # --- Vue ---

  - id: vue-router-redirect-taint
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Open Redirect: Untrusted data is passed to Vue routing functions (push/replace). 
      This can lead to phishing attacks. Validate that the URL is a relative path.
    options:
      interfile: true
      taint_assume_safe_indexes: true
    pattern-sources: *vue_sources
    pattern-propagators: *js_propagators
    pattern-sinks:
      - pattern-either:
          - pattern: this.$router.push($SINK)
          - pattern: this.$router.replace($SINK)
          - pattern: router.push($SINK)
          - pattern: router.replace($SINK)
          - pattern: useRouter().push($SINK)
          - pattern: useRouter().replace($SINK)
          - pattern: |
              this.$router.push({ path: $SINK, ... })
          - pattern: |
              this.$router.replace({ path: $SINK, ... })
          - pattern: |
              useRouter().push({ path: $SINK, ... })
    pattern-sanitizers:
      - pattern-either:
          - pattern: |
              if ($SINK.startsWith('/')) { ... }

  - id: vue-nuxt-ssrf-taint
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      SSRF: Untrusted user input from the request or route is used to construct 
      a backend API call using $fetch or useFetch in Nuxt. An attacker can force 
      the server to scan internal networks. Validate the URL schema.
    options:
      interfile: true
      taint_assume_safe_indexes: true
    pattern-sources: *vue_sources
    pattern-propagators: *js_propagators
    pattern-sinks:
      - pattern-either:
          - pattern: $fetch($SINK, ...)
          - pattern: useFetch($SINK, ...)
          - pattern: useAsyncData(..., () => $fetch($SINK, ...))
          - pattern: $axios.get($SINK)
          - pattern: $axios.post($SINK)
    pattern-sanitizers:
      - pattern-either:
          - pattern: |
              if ($SINK.startsWith('/')) { ... }

  # --- Angular ---

  - id: angular-router-redirect-taint
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Open Redirect: Untrusted data is used dynamically in Angular navigateByUrl() 
      or navigate(). Ensure the target is validated against an allowlist or restricted 
      to safe local paths.
    options:
      interfile: true
      taint_assume_safe_indexes: true
    pattern-sources: *angular_sources
    pattern-propagators: *js_propagators
    pattern-sinks:
      - pattern-either:
          - pattern: $ROUTER.navigateByUrl($SINK)
          - pattern: $ROUTER.navigate([..., $SINK, ...])
    pattern-sanitizers:
      - pattern-either:
          - pattern: |
              if ($SINK.startsWith('/')) { ... }

  # ==============================================================================
  # 5. Паттерны, связанные с использованием глобальных переменных
  # ==============================================================================

  # --- Global Scope Pollution ---

  - id: dom-prototype-pollution-assignment-taint
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Prototype Pollution: Untrusted data is used to dynamically construct object properties. 
      An attacker can inject '__proto__' to manipulate the global object prototype, 
      leading to XSS, RCE, or logic bypass. Avoid dynamic keys.
    options:
      interfile: true
      taint_assume_safe_indexes: true
    pattern-sources: *js_sources
    pattern-propagators: *js_propagators
    pattern-sinks:
      - pattern-either:
          - pattern: $OBJ['__proto__'] = $SINK
          - pattern: $OBJ.__proto__ = $SINK
          - pattern: $OBJ.constructor.prototype = $SINK
          - pattern: $OBJ[$SINK][$KEY] = $VAL
          - pattern: $OBJ[$KEY][$SINK] = $VAL
          - pattern: Object.assign($OBJ, $SINK)
          - pattern: _.assign($OBJ, $SINK)

  - id: dom-merge-prototype-pollution-taint
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Prototype Pollution: Untrusted JSON payload is passed directly to a recursive 
      merge function. If the payload contains '__proto__', it will pollute the global 
      Object prototype. Use safe merge libraries or validate the payload.
    options:
      interfile: true
      taint_assume_safe_indexes: true
    pattern-sources: *js_sources
    pattern-propagators: *js_propagators
    pattern-sinks:
      - pattern-either:
          - pattern: merge($TARGET, $SINK, ...)
          - pattern: deepmerge($TARGET, $SINK, ...)
          - pattern: _.merge($TARGET, $SINK, ...)
          - pattern: _.mergeWith($TARGET, $SINK, ...)
          - pattern: _.defaultsDeep($TARGET, $SINK, ...)
          - pattern: deepExtend($TARGET, $SINK)
          - pattern: extend(true, $TARGET, $SINK)

  # ==============================================================================
  # 6. Паттерны, связанные с использованием внешних библиотек
  # ==============================================================================

  # --- Third-party eval ---

  - id: lodash-insecure-template
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Code Execution (RCE) / XSS: Lodash's _.template() function allows arbitrary 
      code execution when the 'variable' option is combined with untrusted template strings. 
      Avoid dynamically generating templates from user input.
    patterns:
      - pattern-either:
          - pattern: |
              _.template(..., { variable: ... })
          - pattern: |
              template(..., { variable: ... })

  - id: lib-markdown-xss-taint
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Reflected XSS: Untrusted data is passed to a Markdown parser (marked, showdown). 
      Most parsers do NOT sanitize HTML tags or 'javascript:' URIs by default. 
      Wrap the output in DOMPurify before inserting into the DOM.
    options:
      interfile: true
      taint_assume_safe_indexes: true
    pattern-sources: *js_sources
    pattern-propagators: *js_propagators
    pattern-sinks:
      - pattern-either:
          - pattern: marked.parse($SINK)
          - pattern: marked($SINK).toString()
          - pattern: marked.parse($SINK, ...)
          - pattern: marked($SINK)
          - pattern: marked.parseInline($SINK)
          - pattern: new showdown.Converter().makeHtml($SINK)
          - patterns:
              - pattern-inside: |
                  $CONV = new showdown.Converter(...);
                  ...
              - pattern: $CONV.makeHtml($SINK)
          - pattern: markdownit().render($SINK)
          - pattern: markdownit().renderInline($SINK)
          - patterns:
              - pattern-inside: |
                  $MD = markdownit(...);
                  ...
              - pattern: $MD.render($SINK)
    pattern-sanitizers:
      - pattern-either:
          - pattern: DOMPurify.sanitize(...)
          - pattern: sanitizeHtml(...)
